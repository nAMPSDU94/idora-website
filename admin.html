<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>IDORA — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#FAF7F2;--cream-dark:#F2EDE4;
      --gold:#B8962E;--gold-light:#D4AF5A;--gold-pale:#E8D5A0;
      --charcoal:#1E1A16;--charcoal-light:#4A4238;
      --white:#fff;
      --ff-display:'Cormorant Garamond',serif;
      --ff-body:'Jost',sans-serif;
      --status-pending:#D4A017;
      --status-in_progress:#2D7DD2;
      --status-review:#9B59B6;
      --status-done:#27AE60;
      --status-delivered:#1E1A16;
    }
    body{font-family:var(--ff-body);background:var(--cream-dark);color:var(--charcoal);min-height:100vh}

    /* ── Login ── */
    #loginScreen{
      position:fixed;inset:0;background:var(--charcoal);
      display:flex;align-items:center;justify-content:center;z-index:100;
    }
    .login-box{text-align:center;padding:3rem;max-width:380px;width:100%}
    .login-logo{font-family:var(--ff-display);font-size:2.5rem;font-weight:300;letter-spacing:.4em;color:var(--gold);margin-bottom:.3rem}
    .login-sub{font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:3rem}
    .login-box input{
      width:100%;background:transparent;border:none;border-bottom:1px solid rgba(184,150,46,.3);
      padding:.8rem 0;color:var(--white);font-family:var(--ff-body);font-size:.9rem;font-weight:300;
      outline:none;margin-bottom:1.5rem;letter-spacing:.05em;transition:border-color .3s;text-align:center;
    }
    .login-box input:focus{border-bottom-color:var(--gold)}
    .login-box input::placeholder{color:rgba(255,255,255,.3)}
    .login-btn{
      width:100%;background:var(--gold);color:var(--white);border:none;
      padding:1rem;font-family:var(--ff-body);font-size:.72rem;letter-spacing:.3em;
      text-transform:uppercase;cursor:pointer;transition:opacity .3s;
    }
    .login-btn:hover{opacity:.85}
    .login-error{color:#e74c3c;font-size:.75rem;margin-top:1rem;min-height:1.2em}

    /* ── Layout ── */
    #app{display:none}
    header{
      background:var(--charcoal);padding:1.2rem 2.5rem;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid rgba(184,150,46,.2);position:sticky;top:0;z-index:50;
    }
    .header-logo{font-family:var(--ff-display);font-size:1.4rem;font-weight:300;letter-spacing:.4em;color:var(--gold)}
    .header-sub{font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.3)}
    .header-right{display:flex;gap:1rem;align-items:center}
    .logout-btn{
      background:transparent;border:1px solid rgba(184,150,46,.3);color:rgba(255,255,255,.5);
      padding:.5rem 1.2rem;font-family:var(--ff-body);font-size:.65rem;letter-spacing:.2em;
      text-transform:uppercase;cursor:pointer;transition:all .3s;
    }
    .logout-btn:hover{border-color:var(--gold);color:var(--gold)}

    main{padding:2rem 2.5rem;max-width:1400px;margin:0 auto}

    /* ── Stats ── */
    .stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin-bottom:2.5rem}
    .stat-card{
      background:var(--white);border:1px solid rgba(184,150,46,.15);
      padding:1.5rem;text-align:center;
    }
    .stat-n{font-family:var(--ff-display);font-size:2.5rem;font-weight:300;color:var(--gold);line-height:1}
    .stat-l{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--charcoal-light);margin-top:.4rem}

    /* ── Filters ── */
    .filters{display:flex;gap:1rem;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap}
    .filter-btn{
      padding:.5rem 1.2rem;border:1px solid rgba(184,150,46,.2);background:transparent;
      font-family:var(--ff-body);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
      color:var(--charcoal-light);cursor:pointer;transition:all .3s;
    }
    .filter-btn.active,.filter-btn:hover{background:var(--gold);color:var(--white);border-color:var(--gold)}
    .search-input{
      margin-left:auto;padding:.5rem 1rem;border:1px solid rgba(184,150,46,.2);background:var(--white);
      font-family:var(--ff-body);font-size:.8rem;color:var(--charcoal);outline:none;min-width:220px;
      transition:border-color .3s;
    }
    .search-input:focus{border-color:var(--gold)}
    .refresh-btn{
      padding:.5rem 1.2rem;border:1px solid rgba(184,150,46,.2);background:transparent;
      font-family:var(--ff-body);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
      color:var(--charcoal-light);cursor:pointer;transition:all .3s;
    }
    .refresh-btn:hover{border-color:var(--gold);color:var(--gold)}

    /* ── Table ── */
    .table-wrap{background:var(--white);border:1px solid rgba(184,150,46,.15);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead tr{background:var(--charcoal)}
    th{
      padding:1rem 1.2rem;text-align:left;
      font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;
      color:rgba(255,255,255,.4);font-weight:300;
    }
    tbody tr{border-bottom:1px solid rgba(184,150,46,.08);transition:background .2s;cursor:pointer}
    tbody tr:hover{background:rgba(184,150,46,.04)}
    tbody tr:last-child{border-bottom:none}
    td{padding:1rem 1.2rem;font-size:.82rem;font-weight:300;color:var(--charcoal-light)}
    td.main-col{font-weight:400;color:var(--charcoal)}
    .type-badge{
      font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;
      padding:.25rem .7rem;background:rgba(184,150,46,.1);color:var(--gold);
      display:inline-block;
    }

    /* Status badges */
    .status-badge{
      font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;
      padding:.3rem .8rem;display:inline-block;font-weight:400;
    }
    .s-pending{background:rgba(212,160,23,.12);color:#A07810}
    .s-in_progress{background:rgba(45,125,210,.12);color:#1A5FA0}
    .s-review{background:rgba(155,89,182,.12);color:#7D3C98}
    .s-done{background:rgba(39,174,96,.12);color:#1A8A50}
    .s-delivered{background:rgba(30,26,22,.1);color:var(--charcoal)}

    .empty{text-align:center;padding:4rem;color:var(--charcoal-light);font-size:.85rem}

    /* ── Modal ── */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(30,26,22,.7);
      display:flex;align-items:center;justify-content:center;z-index:200;
      opacity:0;pointer-events:none;transition:opacity .3s;
    }
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{
      background:var(--cream);max-width:680px;width:90%;max-height:88vh;
      overflow-y:auto;position:relative;
      transform:translateY(20px);transition:transform .3s;
    }
    .modal-overlay.open .modal{transform:translateY(0)}
    .modal-header{
      background:var(--charcoal);padding:1.8rem 2rem;
      display:flex;justify-content:space-between;align-items:flex-start;
    }
    .modal-title{font-family:var(--ff-display);font-size:1.6rem;font-weight:300;color:var(--white)}
    .modal-close{
      background:none;border:none;color:rgba(255,255,255,.4);font-size:1.2rem;
      cursor:pointer;padding:.2rem;transition:color .3s;line-height:1;
    }
    .modal-close:hover{color:var(--gold)}
    .modal-body{padding:2rem}
    .detail-row{margin-bottom:1.5rem}
    .detail-label{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
    .detail-val{font-size:.9rem;line-height:1.8;color:var(--charcoal-light)}
    .detail-val strong{color:var(--charcoal)}
    .modal-divider{height:1px;background:rgba(184,150,46,.15);margin:1.5rem 0}

    .status-select{
      width:100%;padding:.7rem 1rem;border:1px solid rgba(184,150,46,.25);background:var(--white);
      font-family:var(--ff-body);font-size:.82rem;color:var(--charcoal);outline:none;
      transition:border-color .3s;margin-bottom:1rem;
    }
    .status-select:focus{border-color:var(--gold)}
    .notes-area{
      width:100%;padding:.7rem 1rem;border:1px solid rgba(184,150,46,.25);background:var(--white);
      font-family:var(--ff-body);font-size:.82rem;color:var(--charcoal);outline:none;
      resize:none;height:80px;line-height:1.7;transition:border-color .3s;margin-bottom:1rem;
    }
    .notes-area:focus{border-color:var(--gold)}
    .modal-actions{display:flex;gap:.8rem;flex-wrap:wrap}
    .btn-save{
      background:var(--gold);color:var(--white);border:none;
      padding:.8rem 2rem;font-family:var(--ff-body);font-size:.68rem;
      letter-spacing:.25em;text-transform:uppercase;cursor:pointer;transition:opacity .3s;flex:1;
    }
    .btn-save:hover{opacity:.85}
    .btn-delete{
      background:transparent;color:#e74c3c;border:1px solid rgba(231,76,60,.3);
      padding:.8rem 1.5rem;font-family:var(--ff-body);font-size:.68rem;
      letter-spacing:.25em;text-transform:uppercase;cursor:pointer;transition:all .3s;
    }
    .btn-delete:hover{background:#e74c3c;color:var(--white);border-color:#e74c3c}

    .photos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-top:.5rem}
    .photos-grid img{width:100%;aspect-ratio:1;object-fit:cover}

    .toast{
      position:fixed;bottom:1.5rem;right:1.5rem;z-index:300;
      background:var(--charcoal);border-left:3px solid var(--gold);
      padding:1rem 1.5rem;font-size:.78rem;color:var(--white);
      transform:translateX(120%);transition:transform .4s cubic-bezier(.16,1,.3,1);
    }
    .toast.show{transform:translateX(0)}

    @media(max-width:768px){
      .stats-grid{grid-template-columns:repeat(3,1fr)}
      main{padding:1.5rem}
      table{font-size:.75rem}
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">IDORA</div>
    <div class="login-sub">Admin Panel</div>
    <input type="password" id="secretInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">Access Panel</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div>
      <div class="header-logo">IDORA</div>
      <div class="header-sub">Order Management</div>
    </div>
    <div class="header-right">
      <span id="headerDate" style="font-size:.7rem;color:rgba(255,255,255,.3);letter-spacing:.05em"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total Orders</div></div>
      <div class="stat-card"><div class="stat-n" id="s-pending" style="color:#D4A017">—</div><div class="stat-l">Pending</div></div>
      <div class="stat-card"><div class="stat-n" id="s-in_progress" style="color:#2D7DD2">—</div><div class="stat-l">In Progress</div></div>
      <div class="stat-card"><div class="stat-n" id="s-done" style="color:#27AE60">—</div><div class="stat-l">Done</div></div>
      <div class="stat-card"><div class="stat-n" id="s-delivered" style="color:var(--charcoal)">—</div><div class="stat-l">Delivered</div></div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('in_progress',this)">In Progress</button>
      <button class="filter-btn" onclick="setFilter('review',this)">Review</button>
      <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
      <button class="filter-btn" onclick="setFilter('delivered',this)">Delivered</button>
      <input class="search-input" placeholder="Search by name or email..." oninput="search(this.value)"/>
      <button class="refresh-btn" onclick="loadOrders()">↺ Refresh</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Client</th>
            <th>Magazine Names</th>
            <th>Type</th>
            <th>Status</th>
            <th>Photos</th>
          </tr>
        </thead>
        <tbody id="ordersBody"><tr><td colspan="6" class="empty">Loading orders...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">Order Details</div>
        <div id="modalMeta" style="font-size:.65rem;color:rgba(255,255,255,.35);margin-top:.3rem;letter-spacing:.1em"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3001/api'
  : 'https://idora-api-production.up.railway.app/api';
let secret = '';
let currentFilter = 'all';
let searchQuery = '';
let allOrders = [];

// ── Auth ──
function login() {
  const val = document.getElementById('secretInput').value;
  if (!val) return;
  secret = val;
  loadStats().then(() => {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-GB', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
    loadOrders();
    setInterval(loadStats, 30000);
  }).catch(() => {
    document.getElementById('loginError').textContent = 'Invalid password. Please try again.';
    secret = '';
  });
}

function logout() {
  secret = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('secretInput').value = '';
  document.getElementById('loginError').textContent = '';
}

// ── API calls ──
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'x-admin-secret': secret, 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadStats() {
  const s = await apiFetch('/admin/stats');
  document.getElementById('s-total').textContent = s.total;
  document.getElementById('s-pending').textContent = s.pending;
  document.getElementById('s-in_progress').textContent = s.inProgress;
  document.getElementById('s-done').textContent = s.done;
  document.getElementById('s-delivered').textContent = s.delivered;
}

async function loadOrders() {
  const params = new URLSearchParams();
  if (currentFilter !== 'all') params.set('status', currentFilter);
  if (searchQuery) params.set('search', searchQuery);
  allOrders = await apiFetch(`/admin/orders?${params}`);
  renderOrders(allOrders);
  loadStats();
}

function renderOrders(orders) {
  const tbody = document.getElementById('ordersBody');
  if (!orders.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No orders found.</td></tr>';
    return;
  }
  tbody.innerHTML = orders.map(o => {
    const date = new Date(o.createdAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    const photos = JSON.parse(o.photos || '[]');
    const typeLabel = o.type === 'couple' ? 'Couple' : 'Birthday';
    return `<tr onclick="openOrder('${o.id}')">
      <td>${date}</td>
      <td class="main-col">${esc(o.yourName)}<br><span style="font-size:.72rem;color:#aaa">${esc(o.email)}</span></td>
      <td class="main-col">${esc(o.magNames)}</td>
      <td><span class="type-badge">${typeLabel}</span></td>
      <td><span class="status-badge s-${o.status}">${statusLabel(o.status)}</span></td>
      <td>${photos.length || 0}</td>
    </tr>`;
  }).join('');
}

function statusLabel(s) {
  return {pending:'Pending',in_progress:'In Progress',review:'In Review',done:'Done',delivered:'Delivered'}[s] || s;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Filters ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadOrders();
}

let searchTimer;
function search(val) {
  clearTimeout(searchTimer);
  searchQuery = val;
  searchTimer = setTimeout(loadOrders, 350);
}

// ── Modal ──
async function openOrder(id) {
  const o = allOrders.find(x => x.id === id) || await apiFetch(`/admin/orders/${id}`);
  const photos = JSON.parse(o.photos || '[]');
  const date = new Date(o.createdAt).toLocaleString('en-GB');
  const typeLabel = o.type === 'couple' ? 'Couple Magazine — Love Edition' : 'Birthday Magazine';

  document.getElementById('modalTitle').textContent = o.magNames;
  document.getElementById('modalMeta').textContent = `Order #${o.id} · ${date}`;

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-row">
      <div class="detail-label">Magazine Type</div>
      <div class="detail-val"><strong>${typeLabel}</strong></div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Client</div>
      <div class="detail-val"><strong>${esc(o.yourName)}</strong> — <a href="mailto:${esc(o.email)}" style="color:var(--gold)">${esc(o.email)}</a></div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Their Story</div>
      <div class="detail-val">${esc(o.story)}</div>
    </div>
    ${photos.length ? `<div class="detail-row">
      <div class="detail-label">${photos.length} Photo${photos.length>1?'s':''}</div>
      <div class="photos-grid">${photos.map(p=>`<img src="/uploads/${p}" alt="photo" onerror="this.style.display='none'"/>`).join('')}</div>
    </div>` : ''}
    <div class="modal-divider"></div>
    <div class="detail-row">
      <div class="detail-label">Update Status</div>
      <select class="status-select" id="statusSel">
        ${['pending','in_progress','review','done','delivered'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${statusLabel(s)}</option>`).join('')}
      </select>
    </div>
    <div class="detail-row">
      <div class="detail-label">Internal Notes</div>
      <textarea class="notes-area" id="notesArea" placeholder="Add notes about this order...">${esc(o.notes||'')}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveOrder('${o.id}')">Save Changes</button>
      <button class="btn-delete" onclick="deleteOrder('${o.id}')">Delete Order</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveOrder(id) {
  const status = document.getElementById('statusSel').value;
  const notes = document.getElementById('notesArea').value;
  await apiFetch(`/admin/orders/${id}`, { method:'PATCH', body: JSON.stringify({status, notes}) });
  showToast('Order updated successfully');
  closeModal();
  loadOrders();
}

async function deleteOrder(id) {
  if (!confirm('Delete this order? This cannot be undone.')) return;
  await apiFetch(`/admin/orders/${id}`, { method:'DELETE' });
  showToast('Order deleted');
  closeModal();
  loadOrders();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modal on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
